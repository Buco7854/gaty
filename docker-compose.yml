services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gatie
      POSTGRES_PASSWORD: gatie
      POSTGRES_DB: gatie
    volumes:
      - pgdata:/var/lib/postgresql

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:-gatie}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-gatie}
    volumes:
      - ./configs/mosquitto.conf:/mosquitto/host-config/mosquitto.conf:ro
      - ./configs/mosquitto.acl:/mosquitto/host-config/mosquitto.acl:ro
    entrypoint: ["/bin/sh", "-c", "cp /mosquitto/host-config/mosquitto.conf /mosquitto/config/ && cp /mosquitto/host-config/mosquitto.acl /mosquitto/config/ && mosquitto_passwd -c -b /mosquitto/config/passwd \"$MQTT_USERNAME\" \"$MQTT_PASSWORD\" && chown mosquitto:mosquitto /mosquitto/config/passwd && chmod 600 /mosquitto/config/passwd && exec /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf"]

  # Caddy reverse proxy with On-Demand TLS for custom gate domains.
  # Uses configs/Caddyfile.prod — set APP_DOMAIN env var before starting.
  # For local dev, run `task dev-api` instead (uses the root Caddyfile via `caddy run`).
  caddy:
    image: caddy:2-alpine
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-example.com}
    volumes:
      - ./configs/Caddyfile.prod:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
