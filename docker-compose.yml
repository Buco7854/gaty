services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gatie
      POSTGRES_PASSWORD: gatie
      POSTGRES_DB: gatie
    volumes:
      - pgdata:/var/lib/postgresql

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./configs/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./configs/mosquitto.acl:/mosquitto/config/mosquitto.acl:ro
      - ./configs/dynsec_admin_pw.txt:/mosquitto/config/dynsec_admin_pw.txt:ro
      - mosquitto_data:/mosquitto/data

  # Caddy reverse proxy with On-Demand TLS for custom gate domains.
  # Uses configs/Caddyfile.prod — set APP_DOMAIN env var before starting.
  # For local dev, run `task dev-api` instead (uses the root Caddyfile via `caddy run`).
  caddy:
    image: caddy:2-alpine
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-example.com}
    volumes:
      - ./configs/Caddyfile.prod:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  mosquitto_data:
  caddy_data:
  caddy_config:
