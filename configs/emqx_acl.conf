%% GATIE - EMQX ACL rules
%%
%% Superuser (gatie-server) has full access via is_superuser=true from the auth webhook.
%% These rules apply to gate devices only.
%%
%% Topic format:
%%   Status  : workspace_{ws_id}/gates/{gate_id}/status
%%   Command : workspace_{ws_id}/gates/{gate_id}/command

%% Gate devices can publish status on their own topic.
%% ${username} expands to the gate UUID.
{allow, all, publish, ["workspace_+/gates/${username}/status"]}.

%% Gate devices can subscribe to commands on their own topic.
{allow, all, subscribe, ["workspace_+/gates/${username}/command"]}.

%% Deny everything else.
{deny, all}.
