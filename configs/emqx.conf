## EMQX configuration for GATIE
## Docs: https://docs.emqx.com/en/emqx/v5.0/

## ── Node ─────────────────────────────────────────────────────────────────────
node {
  name = "emqx@127.0.0.1"
  cookie = "emqx_gatie_dev_cookie"
  data_dir = "/opt/emqx/data"
}

## ── Listeners ────────────────────────────────────────────────────────────────
listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 1024000
}

## ── Dashboard ────────────────────────────────────────────────────────────────
dashboard {
  listeners.http {
    bind = 18083
  }
}

## ── Authentication: HTTP webhook ─────────────────────────────────────────────
## EMQX calls the gatie API to validate every MQTT CONNECT.
## Gates: username=gate_uuid, password=gate_jwt_token
## Server: username=gatie-server (superuser)
authentication = [
  {
    mechanism = password_based
    backend = http
    method = post
    url = "http://host.docker.internal:8080/api/mqtt/auth"
    headers {
      "Content-Type" = "application/json"
    }
    body {
      username = "${username}"
      password = "${password}"
    }
    connect_timeout = "5s"
    request_timeout = "5s"
  }
]

## ── Authorization: file-based ACL ────────────────────────────────────────────
authorization {
  no_match = deny
  sources = [
    {
      type = file
      path = "/opt/emqx/etc/acl.conf"
    }
  ]
}
