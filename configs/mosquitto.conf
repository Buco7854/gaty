per_listener_settings false
listener 1883

# ── Dynamic Security Plugin ──────────────────────────────────────────
# Manages client authentication and ACLs at runtime via MQTT messages.
# The admin user is created on first boot from the init password file.
#
# Migration note: to fall back to app-level auth (no broker auth),
# comment out the plugin lines below, set allow_anonymous true,
# uncomment the acl_file line, and set MQTT_AUTH_MODE=payload.
allow_anonymous false
plugin /usr/lib/mosquitto_dynamic_security.so
plugin_opt_config_file /mosquitto/data/dynamic-security.json
plugin_opt_password_init_file /mosquitto/config/dynsec_admin_pw.txt

# ── Fallback: static ACL (MQTT_AUTH_MODE=payload) ────────────────────
# allow_anonymous true
# acl_file /mosquitto/config/mosquitto.acl
