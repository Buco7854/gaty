version: "3"

dotenv: [".env"]

tasks:
  dev-infra:
    desc: "Start infra services (PostgreSQL, Valkey, Mosquitto, Caddy)"
    cmd: docker compose up -d

  dev-infra-down:
    desc: "Down infra services (PostgreSQL, Redis, Mosquitto, Caddy)"
    cmd: docker compose down

  dev-api:
    desc: "Start Go backend with hot-reload (requires air)"
    cmd: air

  dev-frontend:
    desc: "Start React frontend dev server"
    dir: frontend
    cmd: npm run dev

  dev:
    desc: "Start API + frontend concurrently"
    deps: [dev-api, dev-frontend]

  build:
    desc: "Build Go binary"
    cmd: go build -o bin/server ./cmd/server/

  build-frontend:
    desc: "Build React frontend"
    dir: frontend
    cmd: npm run build

  build-all:
    desc: "Build backend and frontend"
    deps: [build, build-frontend]

  install-frontend:
    desc: "Install frontend npm dependencies"
    dir: frontend
    cmd: npm install

  test:
    desc: "Run Go unit tests (no infra required)"
    cmd: go test ./internal/... -v

  test-integration:
    desc: "Run E2E integration tests against live server (requires: task dev-infra + task dev-api)"
    cmd: go test ./tests/integration/... -v -tags integration -timeout 60s

  lint:
    desc: "Run all linters"
    cmds:
      - golangci-lint run ./...
      - cmd: npm run lint
        dir: frontend

  migrate-up:
    desc: "Run all pending migrations"
    cmd: migrate -path migrations -database "{{.DATABASE_URL}}" up

  migrate-down:
    desc: "Rollback last migration"
    cmd: migrate -path migrations -database "{{.DATABASE_URL}}" down 1

  migrate-create:
    desc: "Create a new migration (usage: task migrate-create -- my_migration_name)"
    cmd: migrate create -ext sql -dir migrations -seq {{.CLI_ARGS}}
